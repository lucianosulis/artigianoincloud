{% extends 'base.html' %}

{% block header %}
  <h4>{% block title %}Modifica ricavo{% endblock %}</h4>
  
{% endblock %}

{% block content %}

  <form method="post">
    <label for="number">Numero</label>
    <input name="number" id="number" value="{{ revenue['number'] }}" readonly>
    <label for="date">Data</label>
    <input name="date" id="date" type="date" value="{{ revenue['date'] }}" readonly>
    <label for="customer_name">Cliente</label>
    <input name="customer_name" id="customer_name" value="{{ revenue['customer_name'] }}" readonly>    
    <label for="object">Oggetto</label>
    <input name="object" id="object" value="{{ revenue['object'] }}" readonly>    
    <label for="amount_net">Imponibile</label>
    <input name="amount_net" id="amount_net" value="{{ revenue['amount_net'] }}" readonly>    
    <label for="amount_vat">IVA</label>
    <input name="amount_vat" id="amount_vat" value="{{ revenue['amount_vat'] }}" readonly>    
    <label for="amount_gross">Totale</label>
    <input name="amount_gross" id="amount_gross" value="{{ revenue['amount_gross'] }}" readonly>    
    <label for="month_selector">Seleziona Mese/Anno di competenza</label>
    <input type="month" id="month_selector">
    <small>Imposta automaticamente inizio e fine mese</small>
    <br><br>
    <label for="comp_start">Data inizio competenza</label>
    <input name="comp_start" id="comp_start" type="date" value="{{ request.form['comp_start'] or revenue['comp_start'] }}" required>
    <label for="comp_end">Data fine competenza</label>
    <input name="comp_end" id="comp_end" type="date" value="{{ request.form['comp_end'] or revenue['comp_end'] }}" required>
    <label for="order_id">Ordine</label>
    <SELECT name="order_id" id="order_id" required>
        <OPTION value="" disabled="disabled" selected>Selezionare un ordine</option>
      {% for order in order_list %}
        {% if order.id == revenue['order_id'] %}
          <OPTION value={{order.id}} selected>{{order.date}} - {{order.description}}</option>
        {% else %}
          <OPTION value={{order.id}}>{{order.date}} - {{order.description}}</option>
        {% endif %}
      {% endfor %} 
    </SELECT>
    <br>
    <input type="submit" value="Salva">
    <input class="action" style="height:30px; width:160px" type="button" onclick="goBack()" value="Annulla">
    <input name="goback" id="goback" value="{{ redirect_url }}" hidden>
  </form>
  <form action="{{ url_for('revenue.delete', id=revenue['id']) }}" method="post">
    <input class="danger" type="submit" value="Elimina" onclick="return confirm('Sei sicuro di eliminare questo ricavo?');">
  </form>
  <hr>
  
  <script>
    function goBack() {
        window.location.assign(document.getElementById("goback").value);
    }
    document.addEventListener('DOMContentLoaded', function() {
        const monthInput = document.getElementById('month_selector');
        const startInput = document.getElementById('comp_start');
        const endInput = document.getElementById('comp_end');

        // 1. Imposta il mese attuale come default nel selettore
        const oggi = new Date();
        const meseCorrente = oggi.toISOString().substring(0, 7); // Ritorna "YYYY-MM"
        monthInput.value = meseCorrente;

        // 2. Funzione per aggiornare le date di competenza
    monthInput.addEventListener('change', function() {
      if (!this.value) return;

      const [year, month] = this.value.split('-').map(Number);
      
      // Primo giorno: semplice stringa, nessun rischio di fuso orario
      const firstDay = `${year}-${month.toString().padStart(2, '0')}-01`;
      
      // Ultimo giorno: usiamo il calcolo locale invece di ISO
      const lastDayDate = new Date(year, month, 0); 
      
      // Estraiamo anno, mese e giorno singolarmente per evitare conversioni UTC
      const L_year = lastDayDate.getFullYear();
      const L_month = String(lastDayDate.getMonth() + 1).padStart(2, '0');
      const L_day = String(lastDayDate.getDate()).padStart(2, '0');
      
      const lastDay = `${L_year}-${L_month}-${L_day}`;

      // Aggiorna i campi
      startInput.value = firstDay;
      endInput.value = lastDay;
    });
  });
</script>
{% endblock %}
